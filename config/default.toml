data_api_base_url = "https://data-api.polymarket.com"
clob_api_base_url = "https://clob.polymarket.com"
gamma_api_base_url = "https://gamma-api.polymarket.com"

[discover]
category = "OVERALL"
time_period = "MONTH"
order_by = "PNL"
candidate_count = 10
activity_limit = 200
positions_limit = 100
closed_positions_limit = 50

[scoring]
min_wallet_trades = 25
min_closed_positions = 8
min_realized_pnl = 250.0
min_win_rate = 0.45
max_position_concentration = 0.65
min_follow_score = 70.0
target_trade_count = 100
stale_after_days = 14
pnl_scale = 1000.0
weight_realized_pnl = 2.0
weight_open_pnl = 0.75
weight_consistency = 1.25
weight_activity = 0.75
weight_freshness = 0.5
weight_leaderboard = 1.0
weight_concentration_penalty = 0.75

[simulation]
follow_delay_secs = 8
slippage_bps = 35.0
wallet_scale = 0.10
max_trade_usdc = 50.0
minimum_trade_usdc = 5.0
starting_cash = 100.0

[monitor]
poll_interval_secs = 12
recent_events_limit = 25
focus_keywords = [
  "bitcoin",
  "btc",
  "ethereum",
  "eth",
  "solana",
  "crypto",
  "president",
  "trump",
  "election",
  "senate",
  "house",
  "white house",
  "fed",
  "sec",
]

[[monitor.wallets]]
label = "Attentive-Silica"
wallet = "0xde17f7144fbd0eddb2679132c10ff5e74b120988"

[[monitor.wallets]]
label = "GamblingIsAllYouNeed"
wallet = "@gamblingisallyouneed"

[storage]
data_dir = "data"
persist_snapshots = true
persist_activity = true

[backtest]
delay_grid_secs = [2, 8, 20]
slippage_grid_bps = [10.0, 35.0, 75.0]
wallet_scale_grid = [0.05, 0.10, 0.20]
max_results = 8
