data_api_base_url = "https://data-api.polymarket.com"
clob_api_base_url = "https://clob.polymarket.com"
gamma_api_base_url = "https://gamma-api.polymarket.com"

[http]
request_timeout_secs = 30
connect_timeout_secs = 10
retry_attempts = 3
retry_backoff_ms = 750
max_concurrent_requests = 6

[discover]
category = "CRYPTO"
time_period = "MONTH"
order_by = "PNL"
candidate_count = 20
activity_limit = 200
positions_limit = 100
closed_positions_limit = 50

[scoring]
min_wallet_trades = 25
min_closed_positions = 8
min_realized_pnl = 250.0
min_win_rate = 0.45
max_position_concentration = 0.65
min_follow_score = 70.0
target_trade_count = 100
stale_after_days = 14
pnl_scale = 1000.0
weight_realized_pnl = 2.0
weight_open_pnl = 0.75
weight_consistency = 1.25
weight_activity = 0.75
weight_freshness = 0.5
weight_leaderboard = 1.0
weight_concentration_penalty = 0.75

[simulation]
follow_delay_secs = 8
slippage_bps = 35.0
impact_slippage_bps = 20.0
wallet_scale = 0.01
max_trade_usdc = 50.0
minimum_trade_usdc = 2.0
min_leader_trade_usdc = 0.0
starting_cash = 100.0
cash_reserve_ratio = 0.1
max_total_exposure_ratio = 0.9
max_position_exposure_ratio = 0.35
max_wallet_exposure_ratio = 0.5
max_open_positions = 20
taker_fee_bps = 50.0

[monitor]
poll_interval_secs = 12
recent_events_limit = 25
focus_keywords = [
    "bitcoin",
    "btc",
    "ethereum",
    "eth",
    "solana",
    "crypto",
    "president",
    "trump",
    "election",
    "senate",
    "house",
    "white house",
    "fed",
    "sec",
]

[[monitor.wallets]]
wallet = "0xde17f7144fbd0eddb2679132c10ff5e74b120988"
label = "Attentive-Silica"
paper_follow_enabled = true

[[monitor.wallets]]
wallet = "@gamblingisallyouneed"
label = "GamblingIsAllYouNeed"
paper_follow_enabled = true

[[monitor.wallets]]
wallet = "0x2a2c53bd278c04da9962fcf96490e17f3dfb9bc1"
label = "0x2a2C53bD278c04DA9962Fcf96490E17F3DfB9Bc1-1772479215461"
paper_follow_enabled = true

[[monitor.wallets]]
wallet = "0xee613b3fc183ee44f9da9c05f53e2da107e3debf"
label = "sovereign2013"
paper_follow_enabled = true

[[monitor.wallets]]
wallet = "0x2005d16a84ceefa912d4e380cd32e7ff827875ea"
label = "RN1"
paper_follow_enabled = true

[service]
poll_interval_secs = 15
print_heartbeat = true
suppress_replay_alerts = true

[alerts]
print_to_stdout = true
persist_to_disk = true
desktop_notifications = false
desktop_command = "notify-send"
alert_on_filled = true
alert_on_partial = true
alert_on_canceled = true
alert_on_skipped_reasons = [
    "cash_reserve_blocked",
    "total_exposure_limit",
    "wallet_exposure_limit",
    "position_exposure_limit",
    "max_open_positions_reached",
    "leader_unwound_before_fill",
    "follower_size_too_small_after_fees",
]

[execution]
mode = "PAPER"
print_to_stdout = true
persist_to_disk = true
submit_partial = true
clob_host = "https://clob.polymarket.com"
chain_id = 137
env_private_key = "POLYMARKET_PRIVATE_KEY"
env_api_key = "POLYMARKET_API_KEY"
env_secret = "POLYMARKET_SECRET"
env_passphrase = "POLYMARKET_PASSPHRASE"

[storage]
data_dir = "data"
persist_snapshots = true
persist_activity = true
persist_paper_account = true

[backtest]
delay_grid_secs = [
    2,
    8,
    20,
]
slippage_grid_bps = [
    10.0,
    35.0,
    75.0,
]
wallet_scale_grid = [
    0.05,
    0.1,
    0.2,
]
max_results = 8
