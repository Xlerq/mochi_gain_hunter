[storage]
data_dir = "data"
persist_snapshots = true
persist_activity = true
persist_paper_account = true

[backtest]
delay_grid_secs = [
    2,
    8,
    20,
]
slippage_grid_bps = [
    10.0,
    35.0,
    75.0,
]
wallet_scale_grid = [
    0.05,
    0.1,
    0.2,
]
max_results = 8
